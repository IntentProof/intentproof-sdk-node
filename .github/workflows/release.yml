# Publish @intentproof/sdk to npm when a semver git tag is pushed (e.g. v0.1.1).
# Prerequisite: repository secret NPM_TOKEN (npm automation token with publish access).
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v6

      - name: Verify git tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} implies ${TAG_VER}, but package.json has ${PKG_VER}"
            exit 1
          fi

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}

      - name: CI (typecheck, lint, format, tests, build, publint)
        run: npm run ci

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
