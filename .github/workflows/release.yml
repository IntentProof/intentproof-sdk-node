# Publish @intentproof/sdk to npm when a semver git tag is pushed (e.g. v0.1.2).
# Prerequisite: repository secret NPM_TOKEN (npm automation token with publish access).
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  checks: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify required CI checks passed on release SHA
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # was `@v8`
        with:
          script: |
            const required = ["hardening", "intentproof-spec", "sdk (22)", "sdk (24)"];
            const { owner, repo } = context.repo;
            const ref = context.sha;
            const runs = await github.paginate(github.rest.checks.listForRef, {
              owner,
              repo,
              ref,
              per_page: 100,
            });
            const names = runs.map((r) => `${r.name}:${r.conclusion ?? r.status}`);
            core.info(`check-runs on ${ref}: ${names.join(", ")}`);
            for (const name of required) {
              const matches = runs.filter((r) => r.name === name);
              if (matches.length === 0) {
                core.setFailed(`Missing required check-run: ${name}`);
                continue;
              }
              const ok = matches.some((r) => r.conclusion === "success");
              if (!ok) {
                core.setFailed(`Required check-run not successful: ${name}`);
              }
            }

  publish:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`

      - name: Resolve pinned intentproof-spec revision
        id: spec_pin
        run: |
          set -euo pipefail
          SHA="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).intentproofSpecCommit")"
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`
        with:
          repository: IntentProof/intentproof-spec
          ref: ${{ steps.spec_pin.outputs.sha }}
          fetch-depth: 0
          path: intentproof-spec

      - name: Verify git tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} implies ${TAG_VER}, but package.json has ${PKG_VER}"
            exit 1
          fi

      - name: Use Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # was `@v6`
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}

      - name: No handwritten model/types outside generated schema package
        working-directory: ${{ github.workspace }}
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: bash scripts/check-no-handwritten-model-types.sh

      - name: CI (typecheck, lint, format, tests, build, publint)
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: npm run ci

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
