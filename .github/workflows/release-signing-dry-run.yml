name: release signing dry run

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: SemVer version to place in dry-run attestations.
        required: true
        default: 0.0.0-dryrun
        type: string
      release_ref:
        description: Git ref to check out for the dry run.
        required: true
        default: refs/heads/main
        type: string

jobs:
  test-package:
    name: "IntentProof Release: Test npm Package"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.release_ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check npm package contents
        run: npm pack --dry-run

  sign-npm-package:
    name: "IntentProof Release: Sign npm Package"
    needs: test-package
    permissions:
      contents: write
      id-token: write
      packages: write
    uses: IntentProof/intentproof-tools/.github/workflows/release-build-sign.yml@317387a9724787e4ac484f39de46d7e559b6c98d
    with:
      artifact_kind: npm
      subject_name: intentproof-sdk-node
      release_version: ${{ inputs.release_version }}
      release_ref: ${{ inputs.release_ref }}
      npm_package_path: .
      attest_to_rekor: false
