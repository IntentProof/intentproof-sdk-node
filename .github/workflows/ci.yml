# SDK: typecheck, eslint, prettier --check, tests + coverage, build, publint (Node 22 + 24)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Resolve pinned intentproof-spec revision
        id: spec_pin
        run: |
          set -euo pipefail
          SHA="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).intentproofSpecCommit")"
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          repository: IntentProof/intentproof-spec
          ref: ${{ steps.spec_pin.outputs.sha }}
          fetch-depth: 0
          path: intentproof-spec

      - uses: actions/setup-node@v6
        with:
          node-version-file: intentproof-spec/.nvmrc
          cache: npm
          cache-dependency-path: intentproof-spec/package-lock.json

      - name: SDK hardening contract audit (spec-only + drift guards)
        run: bash intentproof-spec/scripts/check-sdk-hardening.sh "${{ github.workspace }}"

  intentproof-spec:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Resolve pinned intentproof-spec revision
        id: spec_pin
        run: |
          set -euo pipefail
          SHA="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).intentproofSpecCommit")"
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          repository: IntentProof/intentproof-spec
          ref: ${{ steps.spec_pin.outputs.sha }}
          fetch-depth: 0
          path: intentproof-spec

      - uses: actions/setup-node@v6
        with:
          node-version-file: intentproof-spec/.nvmrc
          cache: npm
          cache-dependency-path: intentproof-spec/package-lock.json

      - name: Fetch spec integrity public key
        env:
          SPEC_INTEGRITY_KEY_URL: https://raw.githubusercontent.com/IntentProof/intentproof-spec/main/keys/spec-integrity.public.pem
        run: |
          set -euo pipefail
          curl -fsSL "${SPEC_INTEGRITY_KEY_URL}" -o "${RUNNER_TEMP}/spec-integrity.public.pem"

      - name: Canonical spec conformance (pin check + oracle + replay)
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
          INTENTPROOF_SDK_ID: node
          INTENTPROOF_REPLAY_VERIFY: "1"
          INTENTPROOF_CONFORMANCE_JSON: "1"
          INTENTPROOF_CERTIFICATE_SCHEMA_VERSION: "v2"
          INTENTPROOF_SPEC_INTEGRITY_PUBLIC_KEY_PATH: ${{ runner.temp }}/spec-integrity.public.pem
        run: bash scripts/spec-conformance.sh

      - name: Upload conformance report artifact
        uses: actions/upload-artifact@v7
        with:
          name: conformance-report-node
          path: intentproof-spec/conformance-report.json
          if-no-files-found: error

      - name: Upload conformance certificate artifact
        uses: actions/upload-artifact@v7
        with:
          name: conformance-certificate-node
          path: intentproof-spec/conformance-certificate.json
          if-no-files-found: error

  sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/sdk

    strategy:
      fail-fast: false
      matrix:
        # Match engines.node (>=22): exercise minimum + next active LTS line.
        node-version: ["22", "24"]

    steps:
      - uses: actions/checkout@v6

      - name: Resolve pinned intentproof-spec revision
        id: spec_pin
        run: |
          set -euo pipefail
          SHA="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).intentproofSpecCommit")"
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          repository: IntentProof/intentproof-spec
          ref: ${{ steps.spec_pin.outputs.sha }}
          fetch-depth: 0
          path: intentproof-spec

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}

      - name: Require packages/sdk/README.md to match root README.md
        working-directory: ${{ github.workspace }}
        run: |
          if ! cmp -s README.md packages/sdk/README.md; then
            echo "::error::packages/sdk/README.md is out of sync with README.md at the repo root. From the repo root run: npm run sync-readme — then commit packages/sdk/README.md"
            exit 1
          fi

      - name: CI (spec guards, typecheck, lint, format, tests, build, publint)
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: npm run ci

      - name: Upload coverage (lcov)
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: packages/sdk/coverage/lcov.info
