# SDK: typecheck, eslint, prettier --check, tests + coverage, build, publint (Node 22 + 24)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  intentproof-spec:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: intentproof/intentproof-spec
          path: intentproof-spec

      - uses: actions/setup-node@v4
        with:
          node-version-file: intentproof-spec/.nvmrc
          cache: npm
          cache-dependency-path: intentproof-spec/package-lock.json

      - name: Canonical spec conformance (Vitest oracle)
        run: bash intentproof-spec/scripts/run-conformance.sh intentproof-spec

  sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/sdk

    strategy:
      fail-fast: false
      matrix:
        # Match engines.node (>=22): exercise minimum + next active LTS line.
        node-version: ["22", "24"]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}

      - name: CI (typecheck, lint, format, tests, build, publint)
        run: npm run ci

      - name: Upload coverage (lcov)
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: packages/sdk/coverage/lcov.info
